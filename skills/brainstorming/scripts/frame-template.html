<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>brainstorming :: session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /*
     * BRAINSTORM COMPANION FRAME TEMPLATE — terminal / phosphor edition
     *
     * Dark: amber-on-black CRT.
     * Light: graph-paper technical manual.
     * Monospace throughout. ASCII-adjacent flourishes.
     */

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ===== THEME VARIABLES ===== */
    /* Light — blueprint on warm paper */
    :root {
      --bg-primary: #f4efe3;
      --bg-secondary: #fbf7ec;
      --bg-tertiary: #ebe4d1;

      --ink: #141110;
      --ink-soft: #3b342c;
      --text-primary: #141110;
      --text-secondary: #574c3e;
      --text-tertiary: #8a7e6a;

      --border: #141110;
      --border-soft: rgba(20, 17, 16, 0.18);
      --grid-line: rgba(30, 96, 145, 0.08);   /* azure-tinted grid lines */

      --accent: #1e6091;             /* deep blueprint ink */
      --accent-hover: #154870;
      --accent-soft: rgba(30, 96, 145, 0.12);

      --selected-bg: #dee9f2;
      --selected-border: #1e6091;

      --success: #2f6b4d;
      --warning: #8a6d1f;
      --error: #a73f2a;

      --font-display: 'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', Consolas, monospace;
      --font-body:    'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', Consolas, monospace;
      --font-prose:   'IBM Plex Sans', -apple-system, system-ui, sans-serif;
      --font-mono:    'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', Consolas, monospace;

      --scan: 0;
    }

    /* Dark — azure phosphor CRT.
       Applies when (a) OS prefers dark AND no explicit override, or
       (b) user explicitly set data-theme="dark". */
    :root[data-theme="dark"] {
      --bg-primary: #0a0d14;
      --bg-secondary: #10151f;
      --bg-tertiary: #1a2334;

      --ink: #4eb3ff;
      --ink-soft: #2a8ad1;
      --text-primary: #d0e3fa;
      --text-secondary: #8fa7be;
      --text-tertiary: #556478;

      --border: #2a3548;
      --border-soft: rgba(78, 179, 255, 0.15);
      --grid-line: rgba(78, 179, 255, 0.05);

      --accent: #4eb3ff;
      --accent-hover: #7cc5ff;
      --accent-soft: rgba(78, 179, 255, 0.14);

      --selected-bg: rgba(78, 179, 255, 0.1);
      --selected-border: #4eb3ff;

      --success: #7cbf8a;
      --warning: #ffb86c;
      --error: #ff6b4a;

      --scan: 0.035;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg-primary: #0a0d14;
        --bg-secondary: #10151f;
        --bg-tertiary: #1a2334;

        --ink: #4eb3ff;
        --ink-soft: #2a8ad1;
        --text-primary: #d0e3fa;
        --text-secondary: #8fa7be;
        --text-tertiary: #556478;

        --border: #2a3548;
        --border-soft: rgba(78, 179, 255, 0.15);
        --grid-line: rgba(78, 179, 255, 0.05);

        --accent: #4eb3ff;
        --accent-hover: #7cc5ff;
        --accent-soft: rgba(78, 179, 255, 0.14);

        --selected-bg: rgba(78, 179, 255, 0.1);
        --selected-border: #4eb3ff;

        --success: #7cbf8a;
        --warning: #ffb86c;
        --error: #ff6b4a;

        --scan: 0.035;
      }
    }

    /* ===== BASE ===== */
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      line-height: 1.55;
      font-feature-settings: 'ss02', 'cv11';
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* Graph paper grid (light) / CRT scanlines (dark) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background-image:
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(78, 179, 255, var(--scan)) 0 1px,
        transparent 1px 3px
      );
      mix-blend-mode: screen;
    }

    /* ===== HEADER (shell-prompt / tmux statusline top) ===== */
    .header {
      background: var(--bg-primary);
      padding: 0.55rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 1.25rem;
      border-bottom: 1px solid var(--accent);
      flex-shrink: 0;
      position: relative;
      z-index: 3;
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }
    .header h1 {
      color: var(--text-primary);
      font-weight: 400;
      letter-spacing: 0;
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header h1 a { color: inherit; text-decoration: none; }
    .header h1 .prompt { color: var(--accent); font-weight: 600; margin-right: 0.35rem; }
    .header h1 .path { color: var(--text-primary); }
    .header h1 .file { color: var(--accent); }
    .header .dateline {
      color: var(--text-tertiary);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
    .header .status {
      color: var(--success);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .header .status::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 0;                /* square — more terminal */
      box-shadow: 0 0 6px var(--success);
    }

    /* ===== THEME TOGGLE ===== */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
    .theme-toggle button {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-tertiary);
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      padding: 0.1rem 0.3rem;
      line-height: 1;
      transition: color 0.12s, border-color 0.12s;
    }
    .theme-toggle button:hover { color: var(--text-secondary); border-color: var(--border-soft); }
    .theme-toggle button.active { color: var(--accent); border-color: var(--accent); }
    .theme-toggle .sep { color: var(--text-tertiary); }

    /* ===== MAIN ===== */
    .main { flex: 1; overflow-y: auto; position: relative; z-index: 2; }
    #claude-content {
      padding: 2.25rem 2rem 3rem;
      min-height: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ===== INDICATOR BAR (bottom statusline) ===== */
    .indicator-bar {
      background: var(--bg-primary);
      border-top: 1px solid var(--accent);
      padding: 0.55rem 1.25rem;
      flex-shrink: 0;
      text-align: left;
      position: relative;
      z-index: 3;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .indicator-bar::before {
      content: '▋';
      color: var(--accent);
      animation: blink 1.1s steps(2, end) infinite;
    }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .indicator-bar .selected-text {
      color: var(--accent);
      font-weight: 500;
    }

    /* ===== TYPOGRAPHY ===== */
    h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    h2::before {
      content: '# ';
      color: var(--accent);
      font-weight: 600;
    }
    h3 {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0;
      margin-bottom: 0.25rem;
      color: var(--text-primary);
    }
    h4 {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
      font-weight: 400;
      max-width: 72ch;
      line-height: 1.6;
    }
    .subtitle::before {
      content: '// ';
      color: var(--text-tertiary);
    }
    .section { margin-bottom: 2.5rem; }
    .label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
      display: inline-block;
      font-weight: 500;
    }
    .label::before { content: '// '; color: var(--text-tertiary); font-weight: 400; }

    /* ===== OPTIONS (bracketed choices) ===== */
    .options { display: flex; flex-direction: column; gap: 0.6rem; }
    .option {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 0;
      padding: 0.9rem 1.1rem 0.9rem 1rem;
      cursor: pointer;
      transition: border-left-color 0.12s, background 0.12s, transform 0.12s;
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      position: relative;
      font-family: var(--font-body);
    }
    .option:hover {
      border-left-color: var(--accent);
      background: var(--bg-tertiary);
    }
    .option.selected {
      background: var(--selected-bg);
      border-color: var(--accent);
      border-left-width: 3px;
    }
    .option.selected::after {
      content: '[x] SELECTED';
      position: absolute;
      top: 0.6rem; right: 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 500;
    }
    .option .letter {
      background: transparent;
      color: var(--accent);
      width: auto; height: auto;
      padding: 0;
      border-radius: 0;
      display: block;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 0.95rem;
      flex-shrink: 0;
      min-width: 2.25rem;
    }
    .option .letter::before { content: '['; color: var(--text-tertiary); }
    .option .letter::after  { content: ']'; color: var(--text-tertiary); }
    .option.selected .letter { color: var(--accent); }
    .option .content { flex: 1; min-width: 0; }
    .option .content h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .option .content p { color: var(--text-secondary); font-size: 0.85rem; margin: 0; font-family: var(--font-mono); }

    /* ===== CARDS ===== */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.12s, transform 0.12s;
      position: relative;
    }
    .card::before {
      content: '┌─';
      position: absolute;
      top: 0.25rem; left: 0.4rem;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      opacity: 0;
      transition: opacity 0.12s;
    }
    .card:hover { border-color: var(--accent); }
    .card:hover::before { opacity: 1; }
    .card.selected { border-color: var(--accent); }
    .card.selected::before { content: '[x]'; opacity: 1; color: var(--accent); }
    .card-image {
      background: var(--bg-tertiary);
      aspect-ratio: 16/10;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--border);
    }
    .card-body { padding: 0.9rem 1rem 1.1rem; }
    .card-body h3 { margin-bottom: 0.25rem; }
    .card-body p { color: var(--text-secondary); font-size: 0.85rem; font-family: var(--font-mono); }

    /* ===== MOCKUP ===== */
    .mockup {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .mockup-header {
      background: var(--bg-tertiary);
      color: var(--accent);
      padding: 0.45rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .mockup-header::before { content: '── '; color: var(--text-tertiary); }
    .mockup-body { padding: 1.25rem; }

    /* ===== SPLIT ===== */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }

    /* ===== PROS/CONS ===== */
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    .pros, .cons {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 0.9rem 1rem;
      font-family: var(--font-mono);
    }
    .pros h4 { color: var(--success); }
    .cons h4 { color: var(--error); }
    .pros ul, .cons ul { margin-left: 0; font-size: 0.85rem; color: var(--text-secondary); list-style: none; padding: 0; }
    .pros li, .cons li { margin-bottom: 0.3rem; padding-left: 1.3rem; position: relative; }
    .pros li::before { content: '[+]'; position: absolute; left: 0; color: var(--success); font-weight: 500; font-size: 0.8rem; }
    .cons li::before { content: '[-]'; position: absolute; left: 0; color: var(--error); font-weight: 500; font-size: 0.8rem; }

    /* ===== PLACEHOLDER (ASCII-ish block) ===== */
    .placeholder {
      background: var(--bg-tertiary);
      border: 1px dashed var(--border-soft);
      border-radius: 0;
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .placeholder::before { content: '░░ '; color: var(--text-tertiary); }
    .placeholder::after  { content: ' ░░'; color: var(--text-tertiary); }

    /* ===== INLINE MOCKUP ELEMENTS ===== */
    .mock-nav {
      background: var(--ink);
      color: var(--bg-primary);
      padding: 0.6rem 0.9rem;
      display: flex; gap: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 400;
      border-bottom: 1px solid var(--border);
    }
    .mock-sidebar {
      background: var(--bg-tertiary);
      padding: 0.9rem;
      min-width: 180px;
      border-right: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }
    .mock-content { padding: 1.25rem; flex: 1; }
    .mock-button {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.35rem 0.9rem;
      border-radius: 0;
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .mock-button:hover { background: var(--accent); color: var(--bg-primary); }
    .mock-input {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 0.4rem 0.6rem;
      width: 100%;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    /* ===== MERMAID ===== */
    pre.mermaid {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 1.25rem;
      margin: 0.75rem 0;
      text-align: center;
      overflow-x: auto;
      position: relative;
    }
    pre.mermaid::before {
      content: '── diagram ──';
      position: absolute;
      top: 0.4rem; left: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    pre.mermaid svg { max-width: 100%; height: auto; margin-top: 0.75rem; }

    /* ===== SCROLLBAR ===== */
    .main::-webkit-scrollbar { width: 10px; }
    .main::-webkit-scrollbar-track { background: var(--bg-primary); }
    .main::-webkit-scrollbar-thumb { background: var(--border); border: 2px solid var(--bg-primary); border-radius: 0; }
    .main::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Selection highlight */
    ::selection { background: var(--accent); color: var(--bg-primary); }
  </style>
</head>
<body>
  <div class="header">
    <h1><a href="https://github.com/ehartye/Hartye-superpowers"><span class="prompt">~$</span><span class="path">~/brainstorming/</span><span class="file">session.md</span></a></h1>
    <div class="dateline" id="dateline">—</div>
    <div class="theme-toggle" role="group" aria-label="Theme">
      <button type="button" data-theme-opt="dark" title="Dark theme">[dark]</button>
      <span class="sep">·</span>
      <button type="button" data-theme-opt="light" title="Light theme">[light]</button>
    </div>
    <div class="status">ONLINE</div>
  </div>

  <div class="main">
    <div id="claude-content">
      <!-- CONTENT -->
    </div>
  </div>

  <div class="indicator-bar">
    <span id="indicator-text">awaiting input · click an option, then return to terminal</span>
  </div>

  <script>
    // Populate the dateline — ISO-ish for the nerds
    (function() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      const el = document.getElementById('dateline');
      if (el) el.textContent = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    })();

    // ===== Theme management =====
    // Cookie-based so preference survives the server's per-session random port
    // (localStorage is origin-scoped including port; cookies are host-scoped).
    const THEME_KEY = 'brainstorm_theme';

    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
      return match ? decodeURIComponent(match[1]) : null;
    }

    function setCookie(name, value, days = 365) {
      const expires = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
    }

    function currentTheme() {
      const stored = getCookie(THEME_KEY);
      if (stored === 'dark' || stored === 'light') return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function mermaidVars(isDark) {
      return isDark ? {
        background: '#10151f',
        primaryColor: '#10151f',
        primaryTextColor: '#d0e3fa',
        primaryBorderColor: '#4eb3ff',
        lineColor: '#4eb3ff',
        secondaryColor: '#1a2334',
        tertiaryColor: '#0a0d14',
        textColor: '#d0e3fa',
        mainBkg: '#10151f',
        nodeBorder: '#4eb3ff',
        clusterBkg: 'transparent',
        clusterBorder: '#4eb3ff',
        edgeLabelBackground: '#0a0d14',
        titleColor: '#4eb3ff'
      } : {
        background: '#fbf7ec',
        primaryColor: '#fbf7ec',
        primaryTextColor: '#141110',
        primaryBorderColor: '#141110',
        lineColor: '#141110',
        secondaryColor: '#ebe4d1',
        tertiaryColor: '#f4efe3',
        textColor: '#141110',
        mainBkg: '#fbf7ec',
        nodeBorder: '#141110',
        clusterBkg: 'transparent',
        clusterBorder: '#141110',
        edgeLabelBackground: '#fbf7ec',
        titleColor: '#1e6091'
      };
    }

    function initMermaid(isDark) {
      if (!window.mermaid) return;
      window.mermaid.initialize({
        startOnLoad: false,
        theme: 'base',
        securityLevel: 'loose',
        fontFamily: "'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', Consolas, monospace",
        themeVariables: mermaidVars(isDark),
        flowchart: { curve: 'basis', htmlLabels: true },
        sequence: { actorMargin: 50, messageMargin: 40 }
      });
    }

    function rerenderMermaid(isDark) {
      if (!window.mermaid) return;
      document.querySelectorAll('pre.mermaid').forEach(pre => {
        // Restore original source (saved on first render)
        if (pre.dataset.source) pre.innerHTML = pre.dataset.source;
        pre.removeAttribute('data-processed');
      });
      initMermaid(isDark);
      window.mermaid.run();
    }

    function applyTheme(theme, persist = true) {
      document.documentElement.setAttribute('data-theme', theme);
      if (persist) setCookie(THEME_KEY, theme);
      document.querySelectorAll('.theme-toggle [data-theme-opt]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.themeOpt === theme);
      });
      rerenderMermaid(theme === 'dark');
    }

    // Apply initial theme immediately (before mermaid loads, so CSS vars are right)
    applyTheme(currentTheme(), false);

    // Wire up toggle buttons
    document.querySelectorAll('.theme-toggle [data-theme-opt]').forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.themeOpt));
    });

    // Follow OS changes when user hasn't explicitly overridden
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!getCookie(THEME_KEY)) {
        applyTheme(e.matches ? 'dark' : 'light', false);
      }
    });

    // ===== Mermaid (lazy-load only when the page uses it) =====
    if (document.querySelector('pre.mermaid, code.language-mermaid')) {
      const s = document.createElement('script');
      s.src = '/_static/mermaid.min.js';
      s.onload = () => {
        document.querySelectorAll('pre > code.language-mermaid').forEach(code => {
          const pre = code.parentElement;
          pre.className = 'mermaid';
          pre.textContent = code.textContent;
        });
        // Save original source for re-render on theme toggle
        document.querySelectorAll('pre.mermaid').forEach(pre => {
          pre.dataset.source = pre.textContent;
        });
        initMermaid(currentTheme() === 'dark');
        window.mermaid.run();
      };
      document.head.appendChild(s);
    }
  </script>

</body>
</html>
